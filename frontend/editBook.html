<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Livro</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/editBook.css" />
  </head>
  <body onload="loadBookData()">
    <header>
      <h1>Biblioteca Virtual</h1>
      <nav>
        <a href="/">Home</a>
        <a href="./addBook.html">Adicionar Livro</a>
      </nav>
    </header>

    <h2>Editar Livro</h2>

    <form id="bookEditForm" onsubmit="submitEdition(event)">
      <label for="title">Título:</label><br />
      <input type="text" id="title" name="title" required /><br />
      <label for="author">Autor:</label><br />
      <input type="text" id="author" name="author" required /><br />
      <label for="bookImage">Imagem do Livro:</label><br />
      <input type="text" id="bookImage" name="bookImage" /><br />
      <label for="description">Descrição:</label><br />
      <input type="text" id="description" name="description" /><br /><br />
      <input type="submit" value="Atualizar Livro" />
    </form>
    
    <p id="message"></p>

    <script src="api/api.config.js"></script>
    <script src="js/editBook.cb.js"></script>
  </body>
</html>
